name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sigma
          POSTGRES_PASSWORD: sigma
          POSTGRES_DB: sigma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sigma -d sigma"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: migrate and test
        env:
          DATABASE_URL: postgres://sigma:sigma@localhost:5432/sigma
        run: cargo test --all-targets
