# Shared PostgreSQL for Sigma web services (local dev).
# Usage: docker compose -f docker-compose.deps.yml up -d
services:
  postgres:
    image: postgres:16-bookworm
    container_name: sigma-pg-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: sigma
      POSTGRES_PASSWORD: sigma
      POSTGRES_DB: sigma
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigma -d sigma"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sigma-dev

volumes:
  postgres-data:

networks:
  sigma-dev:
    external: true
    name: sigma-dev
